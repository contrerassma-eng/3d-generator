name: pages

# Publica en la rama gh-pages (fuente actual de GitHub Pages de este repo):
# - raíz: app CAD web ya publicada (se conserva, no se toca)
# - metodo/: documentación del método + paquetes 70_web/ de proyectos
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install markdown
      - run: python tools/build_pages.py _site
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          destination_dir: metodo
          keep_files: true
          commit_message: "Publicar metodo/ (docs + visores) desde"
