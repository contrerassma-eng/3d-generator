name: Publicar CAD en GitHub Pages

on:
  push:
    branches: [main, claude/3d-design-software-62eku4]
    paths:
      - 'cad/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Publica cad/ en la rama gh-pages (fuente clásica de GitHub Pages,
      # no depende del entorno protegido github-pages ni de habilitación por API)
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cad
          commit_message: 'Publicar cad/ en Pages'
