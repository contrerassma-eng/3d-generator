<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>foto3d — visor</title>
<style>
  :root { --bg:#101216; --panel:#191c22e6; --text:#e8eaed; --dim:#9aa0a6;
          --measured:#34a853; --web:#4d90fe; --user:#fbbc04; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:14px/1.45 system-ui,Segoe UI,sans-serif; overflow:hidden; }
  #app { position:fixed; inset:0; }
  #topbar { position:fixed; top:0; left:0; right:0; display:flex; gap:8px; align-items:center;
            padding:10px 14px; background:linear-gradient(#101216f0,#10121600); z-index:10; }
  #topbar h1 { font-size:15px; font-weight:600; margin-right:auto; }
  button { background:#262a33; color:var(--text); border:1px solid #3a3f4b; border-radius:8px;
           padding:7px 13px; cursor:pointer; font-size:13px; }
  button:hover { background:#30353f; }
  button.on { background:#3b4d7a; border-color:#5b7bc0; }
  button:disabled { opacity:.4; cursor:default; }
  #panel { position:fixed; top:54px; right:14px; width:330px; max-height:calc(100vh - 120px);
           overflow:auto; background:var(--panel); border:1px solid #2c313b; border-radius:12px;
           padding:14px; z-index:10; display:none; }
  #panel.open { display:block; }
  #panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); margin:10px 0 6px; }
  .fact { padding:7px 0; border-bottom:1px solid #262b34; }
  .fact .claim { font-weight:600; }
  .fact .src { color:var(--dim); font-size:12px; word-break:break-all; }
  .fact a { color:var(--web); }
  .chip { display:inline-block; font-size:11px; padding:1px 8px; border-radius:99px; margin-left:6px;
          color:#0e1013; font-weight:700; vertical-align:middle; }
  .chip.measured { background:var(--measured); } .chip.web { background:var(--web); } .chip.user { background:var(--user); }
  #status { position:fixed; left:14px; bottom:14px; background:var(--panel); border:1px solid #2c313b;
            border-radius:10px; padding:8px 14px; z-index:10; max-width:60vw; }
  #scalewarn { position:fixed; bottom:14px; right:14px; background:#5c4302; border:1px solid var(--user);
               color:#ffe9a8; border-radius:10px; padding:8px 14px; z-index:10; font-size:12.5px; display:none; }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.177.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.177.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="app"></div>
<div id="topbar">
  <h1 id="title">foto3d</h1>
  <button id="btnMesh" class="on">Malla</button>
  <button id="btnSplat" disabled>Splat</button>
  <button id="btnMeasure">📏 Medir</button>
  <button id="btnGrid">Grilla</button>
  <button id="btnProv">Procedencia</button>
</div>
<div id="panel"></div>
<div id="status">Cargando…</div>
<div id="scalewarn">⚠ Modelo sin escala métrica certificada — ver INFORME.md</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const $ = id => document.getElementById(id);
const status = msg => { $('status').textContent = msg; };

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;
$('app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101216);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.001, 5000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const grid = new THREE.GridHelper(10, 20, 0x3a3f4b, 0x262a33);
grid.visible = false;
scene.add(grid);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

let manifest = null, provenance = null, meshRoot = null, splatMesh = null;

function fitCamera(object) {
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3()).length();
  const center = box.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  camera.position.copy(center).add(new THREE.Vector3(size * 0.6, size * 0.4, size * 0.9));
  camera.near = size / 1000; camera.far = size * 20;
  camera.updateProjectionMatrix();
  grid.position.y = box.min.y;
  grid.scale.setScalar(size / 10);
}

async function loadAll() {
  try {
    manifest = await (await fetch('data/manifest.json')).json();
    provenance = await (await fetch('data/provenance.json')).json();
  } catch (e) {
    status('ERROR: no se pudo leer data/manifest.json — sirve esta carpeta por HTTP (python -m http.server)');
    throw e;
  }
  $('title').textContent = `foto3d — ${manifest.project}`;
  if (!manifest.scale_factor) $('scalewarn').style.display = 'block';
  buildPanel();

  const loader = new GLTFLoader();
  const draco = new DRACOLoader();
  draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.177.0/examples/jsm/libs/draco/gltf/');
  loader.setDRACOLoader(draco);
  const ktx2 = new KTX2Loader()
    .setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.177.0/examples/jsm/libs/basis/')
    .detectSupport(renderer);
  loader.setKTX2Loader(ktx2);
  loader.setMeshoptDecoder(MeshoptDecoder);

  status('Cargando malla…');
  const gltf = await loader.loadAsync(manifest.model);
  meshRoot = gltf.scene;
  scene.add(meshRoot);
  fitCamera(meshRoot);
  status(`Malla cargada · ${manifest.scale_factor ? 'escala métrica activa (mm)' : 'sin escala métrica'}`);

  if (manifest.splat) $('btnSplat').disabled = false;
}

async function toggleSplat(on) {
  if (on && !splatMesh) {
    status('Cargando renderer de splats (Spark)…');
    try {
      const { SplatMesh } = await import('https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@latest/dist/spark.module.js');
      splatMesh = new SplatMesh({ url: manifest.splat });
      scene.add(splatMesh);
      status('Splat cargado (representación fotorrealista — no medible)');
    } catch (e) {
      status('No se pudo cargar Spark/splat: ' + e.message);
      return;
    }
  }
  if (splatMesh) splatMesh.visible = on;
  if (meshRoot) meshRoot.visible = !on;
  $('btnSplat').classList.toggle('on', on);
  $('btnMesh').classList.toggle('on', !on);
}

// ---- Medición: dos clics sobre la malla → distancia (× factor de escala) ----
let measuring = false, measurePts = [], measureGroup = new THREE.Group();
scene.add(measureGroup);
const raycaster = new THREE.Raycaster();

function clearMeasure() {
  measureGroup.clear(); measurePts = [];
}
renderer.domElement.addEventListener('pointerdown', ev => {
  if (!measuring || !meshRoot || !meshRoot.visible || ev.button !== 0) return;
  const r = renderer.domElement.getBoundingClientRect();
  raycaster.setFromCamera(new THREE.Vector2(
    ((ev.clientX - r.left) / r.width) * 2 - 1,
    -((ev.clientY - r.top) / r.height) * 2 + 1), camera);
  const hit = raycaster.intersectObject(meshRoot, true)[0];
  if (!hit) return;
  if (measurePts.length === 2) clearMeasure();
  measurePts.push(hit.point.clone());
  const dotSize = camera.position.distanceTo(controls.target) / 220;
  const dot = new THREE.Mesh(new THREE.SphereGeometry(dotSize),
    new THREE.MeshBasicMaterial({ color: 0xfbbc04, depthTest: false }));
  dot.renderOrder = 99; dot.position.copy(hit.point);
  measureGroup.add(dot);
  if (measurePts.length === 2) {
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(measurePts),
      new THREE.LineBasicMaterial({ color: 0xfbbc04, depthTest: false }));
    line.renderOrder = 99;
    measureGroup.add(line);
    const d = measurePts[0].distanceTo(measurePts[1]);
    status(manifest.scale_factor
      ? `Distancia: ${(d * manifest.scale_factor).toFixed(1)} mm`
      : `Distancia: ${d.toFixed(4)} unidades de modelo (SIN escala métrica — definir factor_escala)`);
  } else {
    status('Medición: clic en el segundo punto…');
  }
});

// ---- Panel de procedencia ----
function buildPanel() {
  const sc = provenance.layers?.scale || {};
  const rows = (provenance.facts || []).map(f => {
    const src = f.source || {};
    const link = src.url
      ? `<a href="${src.url}" target="_blank" rel="noopener">${new URL(src.url).hostname}</a> (consultado ${src.accessed})`
      : (src.method || '');
    const val = [f.value, f.unit].filter(v => v !== null && v !== undefined && v !== '').join(' ');
    return `<div class="fact"><span class="claim">${f.claim}</span>` +
      `<span class="chip ${f.layer}">${f.layer}</span>` +
      (f.render_only ? ' <span class="chip user">solo render</span>' : '') +
      `<div>${val}</div><div class="src">${link}</div></div>`;
  }).join('');
  $('panel').innerHTML =
    `<h2>Escala</h2><div class="fact">factor: ${sc.factor ?? '—'} · método: ${sc.method ?? '—'}` +
    ` · discrepancia: ${sc.discrepancia_pct ?? '—'} %</div>` +
    `<h2>Hechos (${(provenance.facts || []).length})</h2>${rows}` +
    `<h2>Integridad</h2>` +
    Object.entries(provenance.hashes || {}).map(([k, v]) =>
      `<div class="fact"><span class="claim">${k}</span><div class="src">${v}</div></div>`).join('');
}

// ---- Botones ----
$('btnMesh').onclick = () => toggleSplat(false);
$('btnSplat').onclick = () => toggleSplat(true);
$('btnGrid').onclick = () => { grid.visible = !grid.visible; $('btnGrid').classList.toggle('on', grid.visible); };
$('btnProv').onclick = () => { $('panel').classList.toggle('open'); $('btnProv').classList.toggle('on'); };
$('btnMeasure').onclick = () => {
  measuring = !measuring;
  $('btnMeasure').classList.toggle('on', measuring);
  controls.enableRotate = !measuring;
  if (!measuring) { clearMeasure(); status('Medición desactivada'); }
  else status('Medición: clic en el primer punto (rotación desactivada; rueda = zoom)');
};

renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, camera); });
loadAll();
</script>
</body>
</html>
