<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>foto3d CAD — diseño paramétrico</title>
<style>
  :root {
    --bg:#0f1216; --panel:#171b21; --panel2:#1d222a; --border:#2b323d;
    --text:#e8eaed; --dim:#98a0ab; --accent:#4d90fe; --accent2:#f0a437;
    --ok:#34a853; --warn:#fbbc04; --danger:#e05a4e;
    --topbar-h:48px; --rail-w:64px; --status-h:28px;
  }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--text); font:13px/1.45 system-ui,'Segoe UI',sans-serif; overflow:hidden; }

  #layout { display:grid; height:100vh; height:100dvh;
            grid-template-rows:var(--topbar-h) 1fr var(--status-h);
            grid-template-columns:var(--rail-w) 1fr; }

  /* ---- barra superior ---- */
  #toolbar { grid-column:1/3; display:flex; align-items:center; gap:6px; padding:0 8px;
             background:var(--panel); border-bottom:1px solid var(--border); overflow-x:auto; }
  #toolbar::-webkit-scrollbar { display:none; }
  #toolbar .brand { font-weight:700; font-size:14px; white-space:nowrap; padding:0 4px; }
  #toolbar .brand span { color:var(--accent); }
  #toolbar .spacer { flex:1; }

  button { background:var(--panel2); color:var(--text); border:1px solid var(--border); border-radius:8px;
           padding:8px 11px; cursor:pointer; font-size:12.5px; white-space:nowrap; min-height:36px; }
  button:hover { background:#262c36; border-color:#3d4654; }
  button.on { background:#2b4270; border-color:var(--accent); }
  button.danger:hover { border-color:var(--danger); color:#ffb4ac; }
  button:disabled { opacity:.4; cursor:default; }
  #btnPanel { min-width:42px; }

  /* ---- iconos SVG (line-art, currentColor) ---- */
  .ic-svg { width:20px; height:20px; display:block; flex:none; stroke:currentColor; }
  #toolbar button { display:inline-flex; align-items:center; gap:6px; }
  #toolbar button .ic-svg { width:18px; height:18px; }
  #toolbar .brand { display:inline-flex; }
  .tile .tic { display:flex; align-items:center; justify-content:center; }
  .tile .tic .ic-svg { width:22px; height:22px; }
  .node .ic { display:inline-flex; align-items:center; justify-content:center; color:var(--dim); }
  .node .ic .ic-svg { width:15px; height:15px; }
  .node.sel .ic { color:var(--text); }
  .node button .ic-svg { width:15px; height:15px; }
  .node button { display:inline-flex; align-items:center; justify-content:center; }

  /* ---- barra metro izquierda ---- */
  #rail { grid-row:2; grid-column:1; background:var(--panel); border-right:1px solid var(--border);
          display:flex; flex-direction:column; align-items:stretch; overflow-y:auto; padding:6px 5px; gap:4px; }
  #rail::-webkit-scrollbar { display:none; }
  .tile { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
          min-height:52px; padding:6px 2px; border-radius:9px; border:1px solid transparent;
          background:none; font-size:10px; color:var(--dim); line-height:1.15; }
  .tile .tic { font-size:17px; line-height:1; color:var(--text); }
  .tile:hover { background:var(--panel2); border-color:var(--border); }
  .tile.on { background:#2b4270; border-color:var(--accent); color:var(--text); }
  .railsep { height:1px; background:var(--border); margin:4px 6px; flex:none; }
  /* rótulo de categoría estilo panel de la cinta de Inventor */
  .railcat { font-size:8.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim);
             text-align:center; padding:3px 0 1px; margin-top:2px; border-top:1px solid var(--border);
             flex:none; user-select:none; }
  .railcat:first-of-type { border-top:none; margin-top:0; }

  /* pestañas de entorno Pieza/Ensamble arriba (símil pestañas de Inventor) */
  #envTabs { display:flex; flex:none; margin-left:6px; border:1px solid var(--border);
             border-radius:9px; overflow:hidden; }
  #envTabs button { border:none; border-radius:0; padding:8px 16px; min-height:36px;
                    background:none; color:var(--dim); font-weight:600; font-size:12.5px; white-space:nowrap; }
  #envTabs button + button { border-left:1px solid var(--border); }
  #envTabs button.on { background:#2b4270; color:var(--text); }
  #rail.ens .envp { display:none; }
  #rail:not(.ens) .enve { display:none; }

  /* ---- viewport ---- */
  #viewport { grid-row:2; grid-column:2; position:relative; overflow:hidden; }
  #viewport canvas { display:block; touch-action:none; }

  /* ---- panel lateral ocultable (árbol + propiedades) ---- */
  #sidebar { position:absolute; z-index:20; top:var(--topbar-h); bottom:var(--status-h); left:var(--rail-w);
             width:min(320px, calc(100vw - var(--rail-w) - 12px));
             background:#171b21f5; border-right:1px solid var(--border);
             display:flex; flex-direction:column; overflow:hidden;
             transform:translateX(-110%); transition:transform .22s ease; box-shadow:6px 0 24px #0008; }
  #sidebar.open { transform:translateX(0); }
  @media (prefers-reduced-motion: reduce) { #sidebar { transition:none; } }
  #sidebarHead { display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid var(--border); }
  #sidebarHead h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); flex:1; }
  #btnCloseSidebar { padding:4px 10px; min-height:30px; }

  #tree { flex:1; overflow:auto; padding:8px; }
  #tree h3 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim);
             margin:12px 4px 4px; display:flex; align-items:center; gap:7px; }
  #tree h3:first-child { margin-top:2px; }
  #tree h3 .h3ic { display:inline-flex; }
  #tree h3 .h3ic .ic-svg { width:14px; height:14px; opacity:.75; }
  #tree h3 .cnt { margin-left:auto; min-width:18px; text-align:center; background:var(--panel2);
                  border:1px solid var(--border); border-radius:10px; padding:1px 7px; font-size:10px; color:var(--dim); }
  .node.node-part { font-weight:500; }
  .node .pinIc { display:inline-flex; vertical-align:middle; }
  .node .pinIc .ic-svg { width:12px; height:12px; color:var(--accent2); }
  .node { border-radius:8px; padding:7px 8px; cursor:pointer; display:flex; align-items:center; gap:6px; min-height:34px; }
  .node:hover { background:var(--panel2); }
  .node.sel { background:#2b4270; }
  .node .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .node .meta { color:var(--dim); font-size:11px; }
  .node .ic { width:16px; text-align:center; }
  .node button { padding:2px 8px; font-size:12px; border-radius:6px; min-height:26px; }
  .children { margin-left:14px; border-left:1px solid var(--border); padding-left:4px; }
  .swatch { width:10px; height:10px; border-radius:3px; display:inline-block; flex:none; }
  .node.supr .nm, .node.supr .meta { opacity:.45; text-decoration:line-through; }

  #props { border-top:1px solid var(--border); background:var(--panel); flex:none;
           display:flex; flex-direction:column; max-height:55%; }
  #propsHead { display:flex; align-items:center; padding:8px 10px; cursor:pointer; user-select:none; }
  #propsHead h3 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); flex:1; }
  #propsChev { color:var(--dim); transition:transform .15s; }
  #props.closed #propsChev { transform:rotate(-90deg); }
  #propsBody { overflow:auto; padding:0 10px 10px; }
  #props.closed #propsBody { display:none; }

  /* Property Panel estilo Inventor 2026: breadcrumb + acordeón (§1.2) */
  .pp-crumb { display:flex; flex-wrap:wrap; align-items:center; gap:5px; padding:2px 2px 9px;
              font-size:11px; color:var(--dim); }
  .pp-crumb .sep { opacity:.5; }
  .pp-crumb .lvl { padding:2px 7px; border-radius:6px; background:var(--panel2); border:1px solid var(--border); }
  .pp-crumb .lvl.cur { color:var(--text); background:#2b4270; border-color:var(--accent); }
  .pp-crumb .lvl.link { cursor:pointer; }
  .pp-crumb .lvl.link:hover { color:var(--text); border-color:#3d4654; }
  details.pp-sec { border:1px solid var(--border); border-radius:9px; margin-bottom:7px; background:var(--panel2); overflow:hidden; }
  details.pp-sec > summary { list-style:none; cursor:pointer; user-select:none; padding:8px 10px;
              font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim);
              display:flex; align-items:center; gap:7px; }
  details.pp-sec > summary::-webkit-details-marker { display:none; }
  details.pp-sec > summary::before { content:'▸'; font-size:10px; transition:transform .15s; opacity:.7; }
  details.pp-sec[open] > summary::before { transform:rotate(90deg); }
  details.pp-sec[open] > summary { color:var(--text); border-bottom:1px solid var(--border); }
  .pp-secbody { padding:9px 10px 3px; }
  .pp-secbody .btnrow:last-child { margin-bottom:6px; }
  .frow { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .frow label { width:110px; color:var(--dim); font-size:12px; flex:none; }
  .frow input[type=number], .frow input[type=text], .frow select {
    flex:1; min-width:0; background:var(--bg); color:var(--text); border:1px solid var(--border);
    border-radius:7px; padding:8px 8px; font-size:14px; }
  .frow input[type=color] { width:44px; height:32px; padding:0; border:1px solid var(--border); border-radius:7px; background:none; }
  .frow input[type=checkbox] { width:19px; height:19px; }
  .btnrow { display:flex; gap:6px; margin-top:8px; }
  .btnrow button { flex:1; }

  #hud { position:absolute; top:66px; left:10px; right:10px; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
  .hudtag { background:#171b21d9; border:1px solid var(--border); border-radius:8px; padding:6px 10px;
            font-size:12.5px; max-width:460px; display:flex; align-items:center; gap:8px; }
  .hudtag b { color:var(--accent2); }
  #hintTag { display:none; border-color:#5a4a20; color:#ffe9b0; }
  #hintText { flex:1; }
  #hintClose { pointer-events:auto; flex:none; padding:2px; min-height:22px; background:none; border:none; color:inherit; opacity:.7; }
  #hintClose:hover { opacity:1; background:none; }
  #hintClose .ic-svg { width:15px; height:15px; }

  /* ViewCube (esquina superior derecha del visor) */
  #viewcube { position:absolute; top:10px; right:10px; z-index:22; display:flex; flex-direction:column; align-items:center; gap:5px; }
  #vcCanvas { width:78px; height:78px; cursor:pointer; filter:drop-shadow(0 3px 8px #0008); }
  #vcTools { display:flex; gap:5px; }
  #vcTools button { padding:6px; min-height:32px; min-width:32px; background:#171b21e0; }
  #vcTools button.on { background:#5a4a20; border-color:var(--accent2); color:#ffe9b0; }
  #vcTools .ic-svg { width:17px; height:17px; }
  @media (max-width:700px){ #vcCanvas { width:64px; height:64px; } }
  #measureLabel { position:absolute; background:#0e2a12e6; border:1px solid var(--ok); color:#c9f2d0;
                  border-radius:8px; padding:4px 9px; font-size:12px; transform:translate(-50%,-130%);
                  pointer-events:none; display:none; white-space:pre; }
  /* glyph de restricción inferida (H/V/∥/⟂/tangente) junto al cursor, estilo Inventor */
  #inferBadge { position:absolute; z-index:27; display:none; pointer-events:none;
                transform:translate(12px,-26px); min-width:20px; height:20px; line-height:18px;
                text-align:center; padding:0 4px; font-size:14px; font-weight:700;
                color:#cfe0ff; background:#171b21f2; border:1px solid var(--accent); border-radius:6px;
                box-shadow:0 3px 10px #0008; }

  /* entrada dinámica (longitud/ángulo) estilo Inventor mientras se dibuja */
  #dynBox { position:absolute; z-index:28; display:none; gap:5px; align-items:center;
            background:#171b21f2; border:1px solid var(--accent2); border-radius:10px;
            padding:5px 6px; box-shadow:0 8px 24px #000a; transform:translate(14px,14px); }
  #dynBox.on { display:flex; }
  #dynBox .dynf { display:flex; align-items:center; gap:3px; color:var(--accent2); font-size:12px; font-weight:600; }
  #dynBox input { width:58px; background:var(--bg); color:var(--text); border:1px solid var(--border);
                  border-radius:6px; padding:5px 6px; font-size:14px; }
  #dynBox #dyn_lock { padding:3px 5px; min-height:28px; font-size:12px; }
  #dynBox #dyn_lock.on { background:#5a4a20; border-color:var(--accent2); }
  #dynBox #dyn_snap { padding:4px 7px; min-height:28px; font-size:11px; white-space:nowrap; }

  /* cinta de boceto ARRIBA, estilo ribbon de Inventor (scroll horizontal) */
  #sketchbar { position:absolute; top:8px; left:8px; right:8px; z-index:25;
               display:none; gap:5px; background:#171b21f0; border:1px solid var(--accent2);
               border-radius:12px; padding:6px; overflow-x:auto; flex-wrap:nowrap;
               box-shadow:0 10px 30px #000a; scrollbar-width:none; }
  #sketchbar::-webkit-scrollbar { display:none; }
  #sketchbar.open { display:flex; }
  #sketchbar button { flex:none; }
  #sketchbar button.on { background:#5a4a20; border-color:var(--accent2); }
  #sketchbar .rsep { flex:none; width:1px; background:var(--border); margin:2px 3px; }

  .dimlabel { position:absolute; z-index:26; transform:translate(-50%,-50%); cursor:pointer;
              background:#0e2a12e6; border:1px solid var(--ok); color:#c9f2d0; border-radius:8px;
              padding:2px 8px; font-size:12.5px; font-weight:600; white-space:nowrap; user-select:none; }
  .dimlabel:hover { background:#164a1f; }

  #dialog { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:30;
            background:var(--panel); border:1px solid var(--accent); border-radius:14px;
            padding:14px 16px; width:min(360px, calc(100vw - var(--rail-w) - 20px));
            max-height:calc(100% - 24px); overflow:auto;
            box-shadow:0 12px 40px #000a; display:none; }
  #dialog h3 { font-size:13px; margin-bottom:10px; }
  /* biblioteca de componentes: buscador + chips + lista */
  #dialog input[type=search] { width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border);
                               border-radius:8px; padding:9px 11px; font-size:14px; }
  .chiprow { display:flex; gap:5px; flex-wrap:wrap; margin:8px 0; }
  .chip { padding:5px 11px; border-radius:16px; font-size:12px; min-height:32px; white-space:nowrap;
          background:var(--panel2); border:1px solid var(--border); color:var(--dim); }
  .chip.on { background:#2b4270; border-color:var(--accent); color:var(--text); }
  .complist { max-height:44vh; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
  .comp-item { text-align:left; padding:7px 9px; line-height:1.3; background:var(--panel2); }
  .comp-item small { opacity:.7; }

  #statusbar { grid-column:1/3; display:flex; align-items:center; gap:12px; padding:0 10px;
               background:var(--panel); border-top:1px solid var(--border); color:var(--dim);
               font-size:12px; overflow:hidden; white-space:nowrap; }
  #statusbar #status { overflow:hidden; text-overflow:ellipsis; }
  #statusbar .right { margin-left:auto; }

  /* ---- ajustes táctiles / pantallas chicas ---- */
  @media (pointer: coarse) {
    button { min-height:42px; }
    .tile { min-height:58px; }
    .node { min-height:40px; }
  }
  @media (max-width: 700px) {
    #toolbar .blbl { display:none; }   /* solo iconos arriba */
    #toolbar button { padding:8px 9px; }
    #statusbar .right { display:none; }
    .frow label { width:84px; }
    /* el panel Modelo ocupa el ancho disponible (queda una franja para cerrar tocando fuera) */
    #sidebar { left:0; right:52px; width:auto; box-shadow:6px 0 24px #000c; }
    .node .meta { max-width:38vw; overflow:hidden; text-overflow:ellipsis; }
    #sketchbar { padding:5px; gap:4px; }
    #sketchbar button { padding:7px 8px; font-size:11.5px; min-height:40px; }
  }
</style>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.min.js" } }
</script>
</head>
<body>
<div id="layout">
  <div id="toolbar">
    <button id="btnPanel" title="Mostrar/ocultar árbol y propiedades"><span class="ic" data-icon="panel"></span></button>
    <div class="brand">foto3d <span>CAD</span></div>
    <div id="envTabs" title="Entorno de trabajo (símil pestañas de Inventor): Pieza modela sólidos; Ensamble restringe y posiciona">
      <button id="envPieza" class="on">Pieza</button>
      <button id="envEns">Ensamble</button>
    </div>
    <div class="spacer"></div>
    <button id="btnGrid" title="Mostrar/ocultar el plano base (grilla) para mirar por abajo"><span class="ic" data-icon="grid"></span><span class="blbl">Grilla</span></button>
    <button id="btnSTL" title="Exportar todo el ensamble a STL binario"><span class="ic" data-icon="stl"></span><span class="blbl">STL</span></button>
    <button id="btnDXF" title="Plano técnico DXF a escala real (marco y cajetín ISO 5457/7200)"><span class="ic" data-icon="dxf"></span><span class="blbl">DXF</span></button>
    <button id="btnPDF" title="Lámina técnica PDF lista para imprimir (vistas, cotas y cajetín)"><span class="ic" data-icon="pdf"></span><span class="blbl">PDF</span></button>
    <button id="btnParams" title="Parámetros globales (fx): valores con nombre y ecuaciones que las cotas pueden citar (ancho, paso=ancho/4)"><span class="ic" data-icon="params"></span><span class="blbl">Parám.</span></button>
    <button id="btnBom" title="Lista de materiales (BOM): enumera y agrupa las piezas del ensamble con cantidad, material y volumen; exporta CSV"><span class="ic" data-icon="bom"></span><span class="blbl">BOM</span></button>
    <button id="btnSave" title="Descargar el proyecto como JSON"><span class="ic" data-icon="save"></span><span class="blbl">Guardar</span></button>
    <button id="btnOpen" title="Abrir un proyecto JSON"><span class="ic" data-icon="open"></span><span class="blbl">Abrir</span></button>
    <button id="btnPaste" title="Pegar JSON de piezas generado por IA (prompt en PROMPT_PIEZAS.md): agrega al proyecto o lo reemplaza"><span class="ic" data-icon="paste"></span><span class="blbl">Pegar</span></button>
    <button id="btnDemo" title="Cargar el ensamble de ejemplo"><span class="ic" data-icon="demo"></span><span class="blbl">Ejemplo</span></button>
    <button id="btnClear" class="danger" title="Vaciar el proyecto"><span class="ic" data-icon="trash"></span><span class="blbl">Nuevo</span></button>
  </div>

  <div id="rail">
    <div class="railcat envp">Crear</div>
    <button class="tile envp" id="btnNewBox" title="Nueva pieza a partir de una caja/placa"><span class="tic" data-icon="box"></span>Caja</button>
    <button class="tile envp" id="btnNewCyl" title="Nueva pieza a partir de un cilindro"><span class="tic" data-icon="cylinder"></span>Cilindro</button>
    <button class="tile envp" id="btnSketch" title="Boceto 2D sobre una cara con geometría proyectada del modelo"><span class="tic" data-icon="sketch"></span>Boceto</button>
    <button class="tile envp" id="btnComp" title="Insertar un componente de la biblioteca: electrónicos y piezas de transportador de geometría real (componentes/catalogo.json)"><span class="tic" data-icon="comp"></span>Comp.</button>
    <button class="tile envp" id="btnChapa" title="Nueva pieza de chapa plegada: material, espesor, factor K y radio de pliegue (por defecto = espesor)"><span class="tic" data-icon="chapa"></span>Chapa</button>
    <div class="railcat envp">Modificar</div>
    <button class="tile envp" id="btnHole" title="Agujero sobre una cara (toca la cara)"><span class="tic" data-icon="hole"></span>Agujero</button>
    <button class="tile envp" id="btnFeature" title="Agregar unión o corte (caja/cilindro) a la pieza seleccionada"><span class="tic" data-icon="feature"></span>Función</button>
    <button class="tile envp" id="btnDirect" title="Edición directa: toca una cara del sólido para cambiar su medida (diámetro, altura o tamaño)"><span class="tic" data-icon="direct"></span>Directo</button>
    <button class="tile envp" id="btnFillet" title="Empalme (redondeo): toca una arista del sólido y dale un radio (símil Empalme de Inventor)"><span class="tic" data-icon="fillet"></span>Empalme</button>
    <button class="tile envp" id="btnChamfer" title="Chaflán: toca una arista del sólido y dale una distancia (corte a 45°)"><span class="tic" data-icon="chamfer"></span>Chaflán</button>
    <button class="tile envp" id="btnPestana" title="Pestaña de chapa sobre una arista (de la base o de la punta de otra pestaña)"><span class="tic" data-icon="pestana"></span>Pestaña</button>
    <button class="tile envp" id="btnToChapa" title="Convertir en chapa: toca la cara grande de una placa; reconoce su espesor y contorno real (con agujeros) y la vuelve chapa para plegar y desarrollar"><span class="tic" data-icon="chapa"></span>A chapa</button>
    <div class="railcat envp">Patrón</div>
    <button class="tile envp" id="btnPatRect" title="Patrón rectangular: repite la función seleccionada del árbol en filas y columnas (símil Inventor)"><span class="tic" data-icon="patrect"></span>Rect.</button>
    <button class="tile envp" id="btnPatCirc" title="Patrón circular: repite la función seleccionada del árbol alrededor de un eje"><span class="tic" data-icon="patcirc"></span>Circular</button>
    <div class="railcat enve">Restringir</div>
    <button class="tile enve" id="btnMate" title="Coincidir dos caras planas (cara contra cara)"><span class="tic" data-icon="mate"></span>Coincidir</button>
    <button class="tile enve" id="btnFlush" title="Alinear dos caras planas (al ras, mismo sentido)"><span class="tic" data-icon="flush"></span>Alinear</button>
    <button class="tile enve" id="btnConcentric" title="Hacer concéntricos dos orificios/cilindros"><span class="tic" data-icon="concentric"></span>Concentr.</button>
    <div class="railcat enve">Posición</div>
    <button class="tile enve" id="btnMove" title="Arrastrar la pieza seleccionada (Shift o 2.º toque = vertical)"><span class="tic" data-icon="move"></span>Mover</button>
    <button class="tile enve" id="btnMagnet" title="Imán de ensamble: al mover piezas ajusta a caras en contacto/al ras, alturas totales, centros y ejes de orificios"><span class="tic" data-icon="magnet"></span>Imán</button>
    <div class="railcat">Edición</div>
    <button class="tile" id="btnIsolate" title="Aislar la pieza seleccionada (ocultar las demás). Con algo aislado, vuelve a tocar para MOSTRAR TODAS (des-aislar)"><span class="tic" data-icon="isolate"></span>Aislar</button>
    <button class="tile" id="btnDelete" title="Eliminar la pieza seleccionada (y sus restricciones). Atajo: tecla Supr/Delete"><span class="tic" data-icon="trash"></span>Eliminar</button>
    <div class="railcat">Vista</div>
    <button class="tile" id="btnSection" title="Vista de sección: corta el modelo por un plano X/Y/Z para ver interiores"><span class="tic" data-icon="section"></span>Sección</button>
    <button class="tile" id="btnView" title="Vista del ensamble: perspectiva libre o vistas ortogonales bloqueadas (planta/frente/lateral/iso) para desplazar piezas sin perspectiva"><span class="tic" data-icon="view"></span>Vista</button>
    <div class="railcat">Inspección</div>
    <button class="tile" id="btnMeasure" title="Medir con referencias: puntos, aristas, caras, circunferencias y ejes (distancias perpendiculares, entre ejes y ángulos)"><span class="tic" data-icon="measure"></span>Medir</button>
  </div>

  <div id="viewport">
    <div id="hud"><div class="hudtag" id="hintTag"><span id="hintText"></span><button id="hintClose" title="Cerrar aviso"><span class="ic" data-icon="close"></span></button></div></div>
    <!-- ViewCube estilo Inventor: cara/arista para orientar; candado bloquea el giro -->
    <div id="viewcube">
      <canvas id="vcCanvas" width="150" height="150" title="Cubo de vistas: toca una cara para esa vista ortogonal"></canvas>
      <div id="vcTools">
        <button id="vcHome" title="Vista inicial (isométrica) y encuadrar"><span class="ic" data-icon="home"></span></button>
        <button id="vcProj" title="Proyección: ortográfica (sin perspectiva) o perspectiva"><span class="ic" data-icon="ortho"></span></button>
        <button id="vcLock" title="Bloquear / permitir el giro de la vista"><span class="ic" data-icon="lockopen"></span></button>
      </div>
    </div>
    <div id="measureLabel"></div>
    <div id="inferBadge"></div>
    <div id="dynBox">
      <label class="dynf"><span id="dyn_len_lbl">L</span><input id="dyn_len" type="number" inputmode="decimal" step="1" placeholder="mm"></label>
      <label class="dynf" id="dyn_angwrap">∠<input id="dyn_ang" type="number" inputmode="decimal" step="1" placeholder="°"><button id="dyn_lock" title="Bloquear el ángulo">🔓</button></label>
      <button id="dyn_snap" title="Snap de ángulo: sin / 5° / 15° / 45°">⊾ 15°</button>
    </div>
    <div id="sketchbar">
      <button data-tool="line" class="on" title="Línea punto a punto (tocar el 1.º punto cierra el contorno)">╱ Línea</button>
      <button data-tool="rect" title="Rectángulo por dos esquinas">▭ Rect</button>
      <button data-tool="circle" title="Círculo por centro y radio">◯ Círc</button>
      <button data-tool="arc" title="Arco por centro, inicio y fin (antihorario)">⌒ Arco</button>
      <button data-tool="polyg" title="Polígono regular por centro y vértice">⬡ Políg</button>
      <button data-tool="pen" title="Lápiz: dibuja a mano alzada y se interpreta como círculo, línea o polilínea">✎ Lápiz</button>
      <span class="rsep"></span>
      <button data-tool="offset" title="Equidistancia: copia paralela de una entidad o referencia a una distancia">∥ Offset</button>
      <button data-tool="fillet" title="Empalme: redondea la esquina entre dos líneas con un radio">◜ Empalme</button>
      <button data-tool="trim" title="Recortar: elimina el tramo tocado, cortando contra todas las entidades y referencias">✂ Recortar</button>
      <button data-tool="extend" title="Alargar: extiende la línea hasta la siguiente entidad o referencia">⇥ Alargar</button>
      <button data-tool="moveEnt" title="Mover: arrastra una entidad (las cotas con candado restringen)">✥ Mover</button>
      <button data-tool="erase" title="Borrar la entidad tocada">⌦ Borrar</button>
      <button data-tool="select" title="Selección por ventana (→ contenido) o captura (← tocado); tap alterna una entidad">⬚ Selec</button>
      <button id="skCopy" title="Copiar la selección con punto base declarado (destinos múltiples con snap)">⧉ Copiar</button>
      <button id="skMirror" title="Espejo: refleja la selección respecto a una línea declarada con dos puntos (con snap)">⇄ Espejo</button>
      <span class="rsep"></span>
      <button data-tool="dim" title="Cota: largo/diámetro (1 entidad) o distancia/ángulo (2 entidades, incluidas referencias proyectadas); 🔒 la fija">⇤⇥ Cota</button>
      <span class="rsep"></span>
      <button data-tool="project" id="skProj" title="Proyectar geometría (como Inventor): toca una CARA para proyectar todo su contorno, una ARISTA o CÍRCULO para proyectar solo esa; tocar algo ya proyectado lo desproyecta">⤓ Proyectar</button>
      <button id="skSlice" title="Corte en el plano del boceto (slice): oculta el material por delante para ver la sección">▤ Corte</button>
      <button id="skOrbit" title="Giro: rota la vista para ver y marcar referencias ocultas; al desactivar vuelve a la vista normal a la cara">🔄 Giro</button>
      <button id="skClose" title="Encadenar el contorno y extruir (unión o corte)">✔ Extruir</button>
      <button id="skUndo" title="Quitar la última entidad o selección">↩</button>
      <button id="skCancel" class="danger" title="Salir sin crear nada">✕</button>
    </div>
    <div id="dialog"></div>
    <aside id="sidebar">
      <div id="sidebarHead">
        <h2>Modelo</h2>
        <button id="btnCloseSidebar" title="Ocultar panel"><span class="ic" data-icon="close"></span></button>
      </div>
      <div id="tree"></div>
      <div id="props">
        <div id="propsHead"><h3>Propiedades</h3><span id="propsChev">▾</span></div>
        <div id="propsBody">Nada seleccionado.</div>
      </div>
    </aside>
  </div>

  <div id="statusbar">
    <span id="status">Listo.</span>
    <span class="right" id="stats"></span>
  </div>
</div>
<input type="file" id="fileInput" accept=".json" style="display:none">
<!-- Desarrollo con módulos ES (sin rebuild). Producción usa index.html + bundle.js -->
<script type="module" src="./js/app.js"></script>
</body>
</html>
