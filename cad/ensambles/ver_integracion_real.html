<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>foto3d — módulo integrado en el base real</title>
<style>html,body{margin:0;height:100%;background:#12151b;overflow:hidden}#i{position:fixed;top:8px;left:10px;color:#cfd6e4;font:12px system-ui;z-index:2}canvas{display:block}</style>
<script type="importmap">{ "imports": { "three": "../vendor/three.module.min.js" } }</script>
</head><body><div id="i">cargando…</div>
<script type="module">
// Módulo de transferencia (foto3d-cad, a color) integrado dentro del equipo
// base REAL teselado del STEP (base.stl + base_colors.bin). El módulo se rota
// para alinear el eje de rodillos con el flujo del base (Y) y se baja para que
// los rodillos emerjan sobre el plano de banda del base.
import * as THREE from 'three';
import { OrbitControls } from '../vendor/OrbitControls.js';
import { buildPartGeometry, partMatrix } from '../js/model.js';

const q = new URLSearchParams(location.search);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x12151b);
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xdfe8f5, 0x2a2f37, 1.05));
const s1 = new THREE.DirectionalLight(0xffffff, 1.7); s1.position.set(600, -800, 1000); scene.add(s1);
const s2 = new THREE.DirectionalLight(0x93a6c8, 0.5); s2.position.set(-700, 600, 400); scene.add(s2);

// --- base real (STL binario + colores por triángulo), SIN la transferencia de
//     rodillos delgados original: base_remove.bin marca (1) los triángulos del
//     transfer viejo + su transmisión, que se OMITEN al construir la malla.
const buf = await (await fetch('base.stl')).arrayBuffer();
const dv = new DataView(buf); const nTri = dv.getUint32(80, true);
const cb = new Uint8Array(await (await fetch('base_colors.bin')).arrayBuffer());
let rm = null;
try { rm = new Uint8Array(await (await fetch('base_remove.bin')).arrayBuffer()); } catch (e) { rm = null; }
const P = [], NR = [], CL = [];
let o = 84;
for (let t = 0; t < nTri; t++) {
  const nx = dv.getFloat32(o, true), ny = dv.getFloat32(o + 4, true), nz = dv.getFloat32(o + 8, true); o += 12;
  const tri = [];
  for (let v = 0; v < 3; v++) { tri.push(dv.getFloat32(o, true), dv.getFloat32(o + 4, true), dv.getFloat32(o + 8, true)); o += 12; } o += 2;
  if (rm && rm[t] === 1) continue;                 // omitir el transfer viejo
  const r = cb[t*3]/255, g2 = cb[t*3+1]/255, b2 = cb[t*3+2]/255;
  for (let v = 0; v < 3; v++) { P.push(tri[v*3], tri[v*3+1], tri[v*3+2]); NR.push(nx, ny, nz); CL.push(r, g2, b2); }
}
const bg = new THREE.BufferGeometry();
bg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(P), 3));
bg.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(NR), 3));
bg.setAttribute('color', new THREE.BufferAttribute(new Float32Array(CL), 3));
scene.add(new THREE.Mesh(bg, new THREE.MeshStandardMaterial({ vertexColors: true, metalness: 0.35, roughness: 0.6, side: THREE.DoubleSide })));

// --- módulo de transferencia (a color), transformado al frame del base ---
const doc = await (await fetch('transfer_rodillos_90.json')).json();
const grp = new THREE.Group();
for (const part of doc.parts) {
  if (part.visible === false) continue;
  const g = buildPartGeometry(part);
  const mesh = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color: part.color || '#8899aa', metalness: 0.2, roughness: 0.65 }));
  mesh.applyMatrix4(partMatrix(part)); grp.add(mesh);
}
// orientar: eje de rodillos (X del módulo) → flujo del base (Y); rotar 90° y
// COLOCAR en el hueco real de la transferencia del STEP (centro X=208, Y=-1121
// medido sobre el teselado). Bajar el plano de banda del módulo (170) al plano
// de banda del base (~86). px/py/z ajustables por URL para calibrar el calce.
const beltBase = 86, beltMod = 170;
const px = Number(q.get('px') ?? 208), py = Number(q.get('py') ?? -1121);
const zoff = Number(q.get('z') ?? (beltBase - beltMod));
grp.rotation.z = Math.PI / 2;
grp.position.set(px, py, zoff);
scene.add(grp);

// --- cámara enfocada al módulo ---
const c = new THREE.Vector3(px, py, 40);
const R = Number(q.get('r') ?? 760);
const cam = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 2, 30000); cam.up.set(0, 0, 1);
const V = { iso: [c.x + R*0.6, c.y - R*0.7, c.z + R*0.55], lado: [c.x + R, c.y, c.z + R*0.1], frente: [c.x, c.y - R, c.z + R*0.1], planta: [c.x, c.y - 1, c.z + R] };
cam.position.set(...(V[q.get('view')] || V.iso)); cam.lookAt(c);
const ctr = new OrbitControls(cam, renderer.domElement); ctr.target.copy(c); ctr.update();
document.getElementById('i').textContent = `Módulo de transferencia integrado en el sorter_CO real — ${doc.parts.length} piezas del módulo + base teselado`;
renderer.setAnimationLoop(() => renderer.render(scene, cam));
window.__listo = true;
</script></body></html>
