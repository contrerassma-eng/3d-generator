<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>foto3d — visor de ensambles</title>
<style>
  html, body { margin: 0; height: 100%; background: #14171c; overflow: hidden; }
  #info { position: fixed; top: 8px; left: 10px; color: #cfd6e4; font: 12px system-ui; z-index: 2; }
  canvas { display: block; }
</style>
<script type="importmap">
{ "imports": { "three": "../vendor/three.module.min.js" } }
</script>
</head>
<body>
<div id="info">cargando…</div>
<script type="module">
// Visor de solo lectura para los JSON de cad/ensambles/ (formato foto3d-cad).
// Uso: ver.html?doc=transfer_rodillos_90.json&view=iso|frente|planta|lado
// Para editar el ensamble, abrir el mismo JSON en ../index.html con 📂 Abrir.
import * as THREE from 'three';
import { OrbitControls } from '../vendor/OrbitControls.js';
import { GLTFLoader } from '../vendor/GLTFLoader.js';
import { MeshoptDecoder } from '../vendor/meshopt_decoder.module.js';
import { buildPartGeometry, partMatrix } from '../js/model.js';

const q = new URLSearchParams(location.search);
const docUrl = q.get('doc') || 'transfer_rodillos_90.json';
const doc = await (await fetch(docUrl)).json();

// Piezas de MALLA REAL (features shape:'mesh' con {src, nodo}): misma lógica
// que el CAD (app.js loadMeshGeometry) — fusionar la instancia del nodo del
// GLB y recentrar XY con base en Z=0. Los src del doc son relativos a cad/.
const gltfLoader = new GLTFLoader();
gltfLoader.setMeshoptDecoder(MeshoptDecoder);
const meshGeomCache = new Map();
const subcompBase = (o) => { for (let p = o.parent; p; p = p.parent) if (p.name) return p.name.replace(/\d+$/, ''); return ''; };
function loadMeshGeometry(src, nodo = null) {
  const key = nodo ? `${src}#${nodo}` : src;
  if (meshGeomCache.has(key)) return meshGeomCache.get(key);
  const promise = MeshoptDecoder.ready.then(() => new Promise((resolve, reject) => {
    gltfLoader.load(`../${src}`, (gltf) => {
      gltf.scene.updateMatrixWorld(true);
      const verts = [];
      const v = new THREE.Vector3();
      gltf.scene.traverse((o) => {
        if (!o.isMesh || !o.geometry) return;
        if (nodo && subcompBase(o) !== nodo) return;
        const g = o.geometry.index ? o.geometry.toNonIndexed() : o.geometry;
        const pa = g.attributes.position;
        for (let i = 0; i < pa.count; i++) {
          v.fromBufferAttribute(pa, i).applyMatrix4(o.matrixWorld);
          verts.push(v.x, v.y, v.z);
        }
      });
      if (!verts.length) { reject(new Error('GLB sin mallas')); return; }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
      geom.scale(1000, 1000, 1000);
      geom.computeBoundingBox();
      const bb = geom.boundingBox;
      geom.translate(-(bb.min.x + bb.max.x) / 2, -(bb.min.y + bb.max.y) / 2, -bb.min.z);
      geom.computeVertexNormals();
      resolve(geom);
    }, undefined, (err) => reject(err instanceof Error ? err : new Error(String(err))));
  }));
  meshGeomCache.set(key, promise);
  return promise;
}
const isMeshPart = (part) => part.features.length === 1 && part.features[0].shape === 'mesh';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14171c);
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xdde4f0, 0x30363f, 1.0));
const sun = new THREE.DirectionalLight(0xffffff, 1.6);
sun.position.set(400, -600, 800);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899bb, 0.5);
fill.position.set(-500, 400, 200);
scene.add(fill);

const bbox = new THREE.Box3();
const addMesh = (g, color, part) => {
  const mesh = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color, metalness: 0.15, roughness: 0.7 }));
  mesh.applyMatrix4(partMatrix(part));
  scene.add(mesh);
  bbox.expandByObject(mesh);
};
for (const part of doc.parts) {
  if (part.visible === false) continue;
  if (isMeshPart(part)) {
    addMesh(await loadMeshGeometry(part.features[0].params.src, part.features[0].params.nodo || null), part.color || '#8899aa', part);
    continue;
  }
  // pieza solo-unión: sin booleanos — un mesh por función con su color (los
  // componentes de la biblioteca traen color por sólido y el solape visual de
  // una unión es idéntico al CSG); con cortes sí se construye el CSG completo
  if (part.features.every((f) => f.op === 'union')) {
    for (const f of part.features)
      addMesh(buildPartGeometry({ ...part, features: [f] }), f.color || part.color || '#8899aa', part);
  } else {
    addMesh(buildPartGeometry(part), part.color || '#8899aa', part);
  }
}
const c = bbox.getCenter(new THREE.Vector3());
const size = bbox.getSize(new THREE.Vector3()).length();

const cam = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 1, 20000);
cam.up.set(0, 0, 1);
const views = {
  iso: [c.x + size * 0.62, c.y - size * 0.62, c.z + size * 0.45],
  frente: [c.x, c.y - size * 1.05, c.z + size * 0.08],
  lado: [c.x + size * 1.05, c.y, c.z + size * 0.08],
  planta: [c.x, c.y - 1e-3, c.z + size * 1.1],
};
cam.position.set(...(views[q.get('view')] || views.iso));
cam.lookAt(c);
const controls = new OrbitControls(cam, renderer.domElement);
controls.target.copy(c);
controls.update();

document.getElementById('info').textContent =
  `${doc.meta?.nombre || docUrl} — ${doc.parts.length} piezas`;
renderer.setAnimationLoop(() => renderer.render(scene, cam));
window.__listo = true; // señal para capturas automatizadas
</script>
</body>
</html>
